version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bypur_api
    ports:
      - "3001:3001"
    environment:
      - ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/bypur_db?sslmode=disable
      - JWT_SECRET=your_secure_jwt_secret_key_32_bytes_min
      - CORS_ORIGIN=http://localhost:3000,http://localhost:3002
      - X_API_KEY=bypur-default-public-api-key-2026
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bypur_network

  postgres:
    image: postgres:16-alpine
    container_name: bypur_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bypur_db
      POSTGRES_INITDB_ARGS: -c shared_preload_libraries=pg_stat_statements
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bypur_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  bypur_network:
    driver: bridge
